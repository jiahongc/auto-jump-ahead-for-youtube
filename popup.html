<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auto Jump Ahead for YouTube</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="panel">
    <h1>Auto Jump Ahead</h1>

    <details class="setting" open>
      <summary>
        <span>YouTube Jump Ahead</span>
        <label class="switch" for="skipJumpAhead">
          <input id="skipJumpAhead" type="checkbox">
          <span class="slider"></span>
        </label>
      </summary>
      <p>Automatically clicks YouTube's own Jump Ahead and related skip controls when YouTube provides them.</p>
    </details>

    <details class="setting" open>
      <summary>
        <span>Chapter-Based Ad Skips</span>
        <label class="switch" for="skipAdChapter">
          <input id="skipAdChapter" type="checkbox">
          <span class="slider"></span>
        </label>
      </summary>
      <p>Best effort. Skips chapters explicitly labeled like "Ad Break", "Paid Promotion", or similar when chapter metadata is available.</p>
    </details>
  </main>

  <script src="popup.js"></script>
</body>
</html>
